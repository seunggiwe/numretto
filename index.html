<style>
:root {
  --bg:        #0a0a0a;
  --fd:        #1a2a3a;
  --fdb:       #2a4a6a;
  --fu:        #f5f0e8;
  --fub:       #c8c0a8;
  --ft:        #0d0d0d;
  --accent:    #e8d44d;
  --text:      #e8e8e8;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#151515;color:var(--text);font-family:'Noto Sans JP',sans-serif;height:100dvh;overflow:hidden;}

/* ── フィールド ── */
#field{position:fixed;top:0;left:0;z-index:0;transform-origin:0 0;}

.cw{
  position:absolute;
  perspective:1100px;
}
.card{
  width:100%;height:100%;
  position:relative;
  transform-style:preserve-3d;
  will-change:transform;
  transform:rotateY(0deg);
}
.cf{
  position:absolute;inset:0;
  border-radius:6px;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
/* 裏面 */
.cb{
  background:var(--fd);
  border:2px solid var(--fdb);
  box-shadow:0 3px 12px rgba(0,0,0,0.5);
}
.cb::after{
  content:'';position:absolute;inset:0;
  background-image:repeating-linear-gradient(45deg,transparent 0,transparent 5px,rgba(255,255,255,0.03) 5px,rgba(255,255,255,0.03) 6px);
}
/* 表面 */
.cv{
  background:var(--fu);
  border:2px solid var(--fub);
  box-shadow:0 3px 12px rgba(0,0,0,0.3);
  transform:rotateY(180deg);
  color:var(--ft);
  font-family:'Bebas Neue',cursive;
  user-select:none;
}

/* ── タイトルカード（常時表向き）── */
.cw.title-card .card{
  transform:rotateY(180deg);
  pointer-events:none;
}
.cw.title-card .cv{
  font-family:'Space Mono',monospace;
  font-weight:700;
  font-size:inherit; /* JS で設定 */
  box-shadow:0 4px 20px rgba(0,0,0,0.45);
}

/* ── GOカード ── */
.cw.go-card{z-index:10;cursor:pointer;}
.cw.go-card .cb{
  border-color:var(--accent);
  box-shadow:0 0 0 1px rgba(232,212,77,0.2),0 6px 30px rgba(0,0,0,0.65);
}
.cw.go-card .cv{flex-direction:column;}
.play-label{font-family:'Bebas Neue',cursive;letter-spacing:0.1em;color:var(--ft);line-height:1;}
.play-hint{font-family:'Bebas Neue',cursive;color:#888;letter-spacing:0.22em;margin-top:5px;}

/* ── 波flip時: 表面を黒い第3面として表示 ── */
.cw.wave-flipped .cv{
  background:#0a0a0a;
  border-color:#1a1a1a;
  color:transparent;
  box-shadow:0 3px 16px rgba(0,0,0,0.8);
}

/* ── モーダル（completto完全準拠） ── */
#mo{
  position:fixed;inset:0;z-index:200;
  background:transparent;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity 0.28s;
}
#mo.show{opacity:1;pointer-events:auto;}
#mo .overlay-card{
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:40px 50px;text-align:center;max-width:480px;width:90%;
  transform:translateY(16px) scale(0.97);
  transition:transform 0.28s cubic-bezier(0.22,1,0.36,1);
}
#mo.show .overlay-card{transform:translateY(0) scale(1);}
.numletto-logo{text-align:center;margin-bottom:28px;}
.logo-tiles{display:flex;justify-content:center;gap:6px;margin-bottom:14px;}
.logo-tile{
  width:38px;height:48px;display:flex;align-items:center;justify-content:center;
  font-family:'Roboto Mono','Bebas Neue',cursive;font-size:0.85rem;font-weight:600;
  background:var(--face-down);border:2px solid var(--face-down-border);
  border-radius:5px;color:transparent;
  background-image:repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(255,255,255,0.025) 3px,rgba(255,255,255,0.025) 4px);
  box-shadow:0 2px 8px rgba(0,0,0,0.5);
}
.logo-title{
  font-family:'Bebas Neue',cursive;font-size:3.2rem;letter-spacing:10px;
  color:var(--accent);text-shadow:0 0 40px rgba(232,212,77,0.35);line-height:1;margin-bottom:4px;
}
.logo-sub-mo{font-size:0.6rem;letter-spacing:4px;color:var(--muted);}
.setup-options{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.setup-row{display:flex;justify-content:space-between;align-items:center;gap:12px;}
.setup-row label{font-size:0.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);white-space:nowrap;}
.setup-row input{
  background:var(--panel);border:1px solid var(--border);color:var(--text);
  font-family:'Roboto Mono',monospace;font-size:0.7rem;padding:6px 10px;border-radius:3px;
  outline:none;width:100%;transition:border-color 0.15s;
}
.setup-row input:focus{border-color:var(--accent);}
.btn{font-family:'Roboto Mono',monospace;font-size:0.7rem;letter-spacing:1px;text-transform:uppercase;padding:7px 14px;border-radius:3px;border:1px solid var(--border);cursor:pointer;transition:all 0.15s;background:transparent;color:var(--text);}
.btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
.btn.primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600;}
.btn.primary:hover{background:rgba(232,212,77,0.85);}

/* ── サブUI ── */
#ui-sub{
  position:fixed;z-index:20;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
  white-space:nowrap;
}
#ui-persons{
  position:fixed;z-index:20;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  pointer-events:none;
}
.logo-sub{font-size:clamp(0.65rem,1.2vw,0.85rem);letter-spacing:0.24em;color:rgba(255,255,255,0.55);font-weight:400;text-shadow:0 1px 3px rgba(0,0,0,0.85);}
#tl{display:flex;flex-direction:column;align-items:center;gap:4px;}
.persons{display:flex;gap:5px;align-items:flex-end;}
.tll{font-size:clamp(0.55rem,0.9vw,0.68rem);letter-spacing:0.22em;color:rgba(232,212,77,0.7);font-weight:300;}

/* グレイン */
#grain{position:fixed;inset:0;z-index:100;pointer-events:none;opacity:0.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px;}
</style>
</head>
<body>
<div id="grain"></div>
<div id="field"></div>
<div id="ui-sub">
  <div class="logo-sub">数字を並べる。ただそれだけ。</div>
</div>
<div id="ui-persons"></div>
<div id="mo">
  <div class="overlay-card" style="max-width:420px;padding-top:36px;">
    <div class="numletto-logo">
      <div class="logo-tiles">
        <span class="logo-tile"></span>
        <span class="logo-tile"></span>
        <span class="logo-tile"></span>
        <span class="logo-tile"></span>
        <span class="logo-tile"></span>
      </div>
      <h1 class="logo-title">NUMLETTO</h1>
      <div class="logo-sub-mo">数字並べ対戦ゲーム</div>
    </div>
    <div class="setup-options" style="gap:12px;">
      <div class="setup-row">
        <label>名 前</label>
        <input type="text" id="myNameInput" placeholder="あなたの名前" maxlength="12"
          style="font-size:0.85rem;padding:10px 12px;"
          onkeydown="if(event.key==='Enter')connectAction()">
      </div>
      <div class="setup-row">
        <label>合言葉</label>
        <input type="text" id="roomIdInput" placeholder="ルーム合言葉"
          style="text-transform:uppercase;font-size:0.85rem;padding:10px 12px;"
          onkeydown="if(event.key==='Enter')connectAction()">
      </div>
    </div>
    <p style="font-size:0.6rem;color:var(--muted);margin:10px 0 16px;">同じ合言葉を入力した人が同じ部屋に集まります</p>
    <button class="btn primary" id="btnConnect" onclick="connectAction()"
      style="width:100%;padding:12px;font-size:0.8rem;letter-spacing:2px;">ENTER ROOM</button>
    <p id="connectError" style="font-size:0.65rem;color:#e05c4b;margin-top:8px;min-height:16px;"></p>
  </div>
</div>



<script>
const GAME_URL = './completto.html';
const LETTERS  = ['N','U','M','L','E','T','T','O'];



function shuffle(a){return a.sort(()=>Math.random()-0.5);}

let centerWrap = null;

// ── ホバーフリップ（通常カード）──
function setupHover(wrap, card){
  let state='back', timer=null;
  wrap.addEventListener('mouseenter',()=>{
    if(timer){clearTimeout(timer);timer=null;}
    state='front';
    card.style.transition='transform 0.48s cubic-bezier(0.4,0,0.2,1)';
    card.style.transform='rotateY(180deg)';
  });
  wrap.addEventListener('mouseleave',()=>{
    if(state!=='front') return;
    state='returning';
    card.style.transition='transform 0.48s cubic-bezier(0.4,0,0.2,1)';
    card.style.transform='rotateY(360deg)';
    timer=setTimeout(()=>{
      card.style.transition='none';
      card.style.transform='rotateY(0deg)';
      state='back';
    },500);
  });
}

// ── GOカード（ホバーでめくれ、クリックでモーダル）──
function setupGo(wrap, card){
  let clicked=false;
  wrap.addEventListener('mouseenter',()=>{
    if(clicked) return;
    card.style.transition='transform 0.48s cubic-bezier(0.4,0,0.2,1)';
    card.style.transform='rotateY(180deg)';
  });
  wrap.addEventListener('mouseleave',()=>{
    if(clicked) return;
    card.style.transition='transform 0.48s cubic-bezier(0.4,0,0.2,1)';
    card.style.transform='rotateY(0deg)';
  });
  wrap.addEventListener('click',()=>{
    if(clicked) return;
    clicked=true;
    startWaveFlip();
  });
}

// ── 対角線ウェーブflip → モーダル表示 ──
function startWaveFlip(){
  // シャッフルアニメ中なら完了を待ってから起動
  if(shuffleTimer !== null){
    const wait = setInterval(()=>{
      if(shuffleTimer === null){ clearInterval(wait); _doWaveFlip(); }
    }, 50);
    return;
  }
  _doWaveFlip();
}

function _doWaveFlip(){
  const uiSub = document.getElementById('ui-sub');
  if(uiSub){ uiSub.style.transition='opacity 0.3s'; uiSub.style.opacity='0'; }
  const playBtn = document.getElementById('playBtn');
  if(playBtn){ playBtn.style.transition='opacity 0.3s'; playBtn.style.opacity='0'; }

  const allWraps   = Array.from(document.querySelectorAll('.cw'));
  const wraps      = Array.from(document.querySelectorAll('.cw:not(.title-card)'));
  const titleCards = Array.from(document.querySelectorAll('.cw.title-card'));

  allWraps.forEach(w=>{ w.style.pointerEvents='none'; });

  const TITLE_FLIP_DUR = 280;
  const TITLE_INTERVAL = 55;
  const WAVE_DELAY     = 200;
  const WAVE_DURATION  = 900;
  const FLIP_DUR       = 380;

  // ① NUMLETTOを左→右に右めくりで裏へ（180→360、その後0にリセット）
  titleCards.forEach((w, i)=>{
    const card = w.querySelector('.card');
    if(!card) return;
    setTimeout(()=>{
      card.style.transition=`transform ${TITLE_FLIP_DUR}ms cubic-bezier(0.4,0,0.2,1)`;
      card.style.transform='rotateY(360deg)';
      // アニメ完了後に0にリセット（次の波で180に持っていくため）
      setTimeout(()=>{
        card.style.transition='none';
        card.style.transform='rotateY(0deg)';
      }, TITLE_FLIP_DUR + 20);
    }, i * TITLE_INTERVAL);
  });

  // ② 裏向き完了後に波スタート
  const waveStart = titleCards.length * TITLE_INTERVAL + TITLE_FLIP_DUR + WAVE_DELAY;

  const getEntries = list => list.map(w=>{
    const r = w.getBoundingClientRect();
    return {w, dist: r.left + r.top};
  });
  const allEntries = getEntries([...wraps, ...titleCards]);
  const minDist = Math.min(...allEntries.map(e=>e.dist));
  const maxDist = Math.max(...allEntries.map(e=>e.dist));
  const range = maxDist - minDist || 1;

  setTimeout(()=>{
    // 全カード（通常+タイトル）を右めくりで黒面へ（0→180）
    allEntries.forEach(({w, dist})=>{
      const delay = ((dist - minDist) / range) * WAVE_DURATION;
      const card = w.querySelector('.card');
      if(!card) return;
      setTimeout(()=>{
        card.style.transition=`transform ${FLIP_DUR}ms cubic-bezier(0.4,0,0.2,1)`;
        card.style.transform='rotateY(180deg)';
        w.classList.add('wave-flipped');
      }, delay);
    });
    setTimeout(()=>{ openModal(); }, WAVE_DURATION + FLIP_DUR + 80);
  }, waveStart);
}

// ── モーダル ──
function openModal(){
  document.getElementById('mo').classList.add('show');
  setTimeout(()=>document.getElementById('myNameInput').focus(), 200);
  const room=new URLSearchParams(location.search).get('room');
  if(room){ const ri=document.getElementById('roomIdInput'); if(ri&&!ri.value) ri.value=room.toUpperCase(); }
}
function closeModal(){
  document.getElementById('mo').classList.remove('show');

  const allWraps   = Array.from(document.querySelectorAll('.cw'));
  const wraps      = Array.from(document.querySelectorAll('.cw:not(.title-card)'));
  const titleCards = Array.from(document.querySelectorAll('.cw.title-card'));

  allWraps.forEach(w=>{ w.style.pointerEvents='none'; });

  const WAVE_DURATION  = 2000; // デバッグ用
  const FLIP_DUR       = 800;
  const TITLE_FLIP_DUR = 500;
  const TITLE_INTERVAL = 120;

  const getEntries = list => list.map(w=>{
    const r = w.getBoundingClientRect();
    return {w, dist: r.left + r.top};
  });
  const allEntries = getEntries([...wraps, ...titleCards]);
  const minDist = Math.min(...allEntries.map(e=>e.dist));
  const maxDist = Math.max(...allEntries.map(e=>e.dist));
  const range = maxDist - minDist || 1;

  // ① 左上→右下の波で全カードを右めくりで裏面へ（180→360、リセット）
  allEntries.forEach(({w, dist})=>{
    const delay = ((dist - minDist) / range) * WAVE_DURATION;
    const card = w.querySelector('.card');
    if(!card) return;
    setTimeout(()=>{
      card.style.transition=`transform ${FLIP_DUR}ms cubic-bezier(0.4,0,0.2,1)`;
      card.style.transform='rotateY(360deg)';
      setTimeout(()=>{
        card.style.transition='none';
        card.style.transform='rotateY(0deg)';
        w.classList.remove('wave-flipped');
      }, FLIP_DUR + 20);
    }, delay);
  });

  // ② 波完了後、タイトルカードを左→右に右めくりで表向き（0→180）
  const afterWave = WAVE_DURATION + FLIP_DUR + 100;
  setTimeout(()=>{
    titleCards.forEach((w, i)=>{
      const card = w.querySelector('.card');
      if(!card) return;
      setTimeout(()=>{
        card.style.transition=`transform ${TITLE_FLIP_DUR}ms cubic-bezier(0.4,0,0.2,1)`;
        card.style.transform='rotateY(180deg)';
      }, i * TITLE_INTERVAL);
    });

    const afterTitle = titleCards.length * TITLE_INTERVAL + TITLE_FLIP_DUR + 80;
    setTimeout(()=>{
      allWraps.forEach(w=>{ w.style.pointerEvents=''; });
      const uiSub = document.getElementById('ui-sub');
      if(uiSub){ uiSub.style.transition='opacity 0.4s'; uiSub.style.opacity='1'; }
      const playBtn = document.getElementById('playBtn');
      if(playBtn){ playBtn.style.transition='opacity 0.4s'; playBtn.style.opacity='1'; }
    }, afterTitle);
  }, afterWave);
}

function connectAction(){
  const name = document.getElementById('myNameInput').value.trim();
  const room = document.getElementById('roomIdInput').value.trim().toUpperCase();
  const errEl = document.getElementById('connectError');
  if(!name){ errEl.textContent='名前を入力してください'; return; }
  errEl.textContent='';
  const p = new URLSearchParams();
  p.set('name', name);
  if(room) p.set('room', room);
  location.href = GAME_URL + '?' + p.toString();
}

document.getElementById('mo').addEventListener('click', e=>{ if(e.target===document.getElementById('mo')) closeModal(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

// ── メイン構築 ──
function build(){
  const field=document.getElementById('field');
  field.innerHTML='';
  centerWrap=null;

  const vw=window.innerWidth, vh=window.innerHeight;
  const gap=4;
  const margin=12;

  // ── カードサイズ固定（アスペクト比4:5） ──
  const BASE_W = 68, BASE_H = 85; // px
  const w = BASE_W, h = BASE_H;

  // 列・行数を画面サイズから逆算（偶数に丸める：8文字タイトルを左右対称に配置するため）
  let cols = Math.floor((vw - margin*2 + gap) / (w + gap));
  if(cols % 2 !== 0) cols--;
  if(cols < 10) cols = 10;

  let rows = Math.floor((vh - margin*2 + gap) / (h + gap));
  if(rows % 2 === 0) rows--;
  if(rows < 5) rows = 5;
  rows -= 1;

  // グリッド全体を画面中央に配置
  const totalW = cols*(w+gap)-gap;
  const totalH = rows*(h+gap)-gap;
  const ox = Math.round((vw - totalW) / 2);
  const oy = Math.round((vh - totalH) / 2) - (h + gap);
  const ox2 = ox; // タイトルは常にgrid中央列に配置するのでシフト不要

  // ── タイトル行・GOカード行の決定（常に画面中央） ──
  const titleRow = Math.floor(rows / 2) - 1;
  const goRow    = titleRow + 1;
  // 偶数列: 中央は cols/2-1 と cols/2 の境界 → タイトル8文字を cols/2-4 〜 cols/2+3 に配置
  const titleStartCol = cols / 2 - 4;
  const lCol = titleStartCol + 3; // L
  const eCol = titleStartCol + 4; // E
  const goCol = titleStartCol + 4; // PLAYボタン基準列（E列）

  const nums=shuffle(Array.from({length:100},(_,i)=>i+1));
  let ni=0;

  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const x=ox2+c*(w+gap);
      const y=oy+r*(h+gap);

      const letterIdx=(r===titleRow && c>=titleStartCol && c<titleStartCol+LETTERS.length)
        ? c-titleStartCol : -1;

      const isPlayAnchor=(r===goRow && c===lCol);

      const wrap=document.createElement('div');
      wrap.className='cw'+(letterIdx>=0?' title-card':'');

      if(isPlayAnchor){
          const centerBtnX = ox2 + eCol*(w+gap) - gap/2;
          const centerBtnY = oy + goRow*(h+gap) + h/2;
          const btn=document.createElement('button');
          btn.id='playBtn';
          btn.style.cssText=`
            position:absolute;
            left:${centerBtnX}px;top:${centerBtnY}px;
            transform:translate(-50%, -50%);
            z-index:10;cursor:pointer;
            background:rgba(10,10,10,0.55);
            backdrop-filter:blur(4px);
            border:1.5px solid var(--accent);
            border-radius:5px;
            padding:12px 22px;
            font-family:'Space Mono',monospace;
            font-size:1.2rem;
            letter-spacing:0.08em;
            color:var(--accent);
            text-shadow:0 0 12px rgba(232,212,77,0.5);
            box-shadow:0 0 18px rgba(232,212,77,0.18),0 4px 20px rgba(0,0,0,0.6);
            transition:background 0.18s,color 0.18s,box-shadow 0.18s,text-shadow 0.18s;
          `;
          btn.textContent='PLAY';
          btn.addEventListener('click', startWaveFlip);
          btn.addEventListener('mouseenter',()=>{
            btn.style.background='var(--accent)'; btn.style.color='var(--ft)'; btn.style.textShadow='none'; btn.style.boxShadow='0 0 28px rgba(232,212,77,0.4),0 4px 20px rgba(0,0,0,0.6)';
            startTitleShuffle();
          });
          btn.addEventListener('mouseleave',()=>{
            btn.style.background='rgba(10,10,10,0.55)'; btn.style.color='var(--accent)'; btn.style.textShadow='0 0 12px rgba(232,212,77,0.5)'; btn.style.boxShadow='0 0 18px rgba(232,212,77,0.18),0 4px 20px rgba(0,0,0,0.6)';
            stopTitleShuffle();
          });
          field.appendChild(btn);
      }

      wrap.style.cssText=`left:${x}px;top:${y}px;width:${w}px;height:${h}px;`;
      const card=document.createElement('div');
      card.className='card';
      const back=document.createElement('div'); back.className='cf cb';
      const front=document.createElement('div'); front.className='cf cv';

      if(letterIdx>=0){
        front.style.fontSize=Math.round(w*0.72)+'px';
        front.textContent=LETTERS[letterIdx];
        card.style.transform='rotateY(180deg)';
      } else {
        front.style.fontSize=Math.round(h*0.34)+'px';
        front.textContent=nums[ni++%100];
      }

      card.append(back,front);
      wrap.appendChild(card);
      field.appendChild(wrap);

      if(letterIdx>=0){
        // ホバーでそのカード1枚だけシャッフルアニメ
        wrap.addEventListener('mouseenter',()=>{ tiltTitleCard(card); });
        wrap.addEventListener('mouseleave',()=>{ resetTitleCard(card); });
      }
      else setupHover(wrap,card);
    }
  }

  // サブUI位置: タイトル行の上
  const titleY = oy + titleRow*(h+gap);
  const uiSub = document.getElementById('ui-sub');
  const uiSubTop = Math.max(8, titleY-36);
  uiSub.style.cssText = `position:absolute;left:50%;transform:translateX(-50%);top:${uiSubTop}px;`;
  uiSub.dataset.origTop = uiSubTop;

  // 人数アイコン: PLAYボタンの下
  const playBtnY = oy + goRow*(h+gap) + h/2;
  const uiPersons = document.getElementById('ui-persons');
  const uiPersonsTop = playBtnY + 36;
  uiPersons.style.cssText = `position:absolute;left:50%;transform:translateX(-50%);top:${uiPersonsTop}px;`;
  uiPersons.dataset.origTop = uiPersonsTop;


}

// 入場アニメ（タイトルカード除く）
function staggerIn(){
  const all=shuffle(Array.from(document.querySelectorAll('.cw:not(.title-card)')));
  all.forEach((w,i)=>{
    w.style.opacity='0';
    w.style.transition='opacity 0.3s';
    setTimeout(()=>{w.style.opacity='1';},i*3);
  });
  // タイトルカードは最後にまとめてフェードイン
  document.querySelectorAll('.cw.title-card').forEach((w,i)=>{
    w.style.opacity='0';
    w.style.transition='opacity 0.5s';
    setTimeout(()=>{w.style.opacity='1';},300+i*60);
  });
}

function tiltTitleCard(card){
  const tilt = (Math.random() - 0.5) * 14;
  const lift = -(Math.random() * 6 + 3);
  card.style.transition = 'transform 0.18s cubic-bezier(0.4,0,0.2,1)';
  card.style.transform  = `rotateY(180deg) rotate(${tilt}deg) translateY(${lift}px)`;
}

function resetTitleCard(card){
  card.style.transition = 'transform 0.25s cubic-bezier(0.4,0,0.2,1)';
  card.style.transform  = 'rotateY(180deg) rotate(0deg) translateY(0px)';
}

// ── PLAYホバー時: タイトルカードを順番に傾けるシャッフル演出 ──
let shuffleTimer = null;
let shuffleStep  = 0;

function startTitleShuffle(){
  if(shuffleTimer !== null) return; // 再生中は新たに起動しない
  shuffleStep = 0;
  const cards = Array.from(document.querySelectorAll('.cw.title-card .card'));
  if(!cards.length) return;

  function tick(){
    if(shuffleStep >= cards.length){
      // 最後の1枚を戻して完全終了
      const last = cards[cards.length - 1];
      last.style.transition = 'transform 0.18s cubic-bezier(0.4,0,0.2,1)';
      last.style.transform  = 'rotateY(180deg) rotate(0deg) translateY(0px)';
      shuffleTimer = null;
      return;
    }

    if(shuffleStep > 0){
      const prev = cards[shuffleStep - 1];
      prev.style.transition = 'transform 0.18s cubic-bezier(0.4,0,0.2,1)';
      prev.style.transform  = 'rotateY(180deg) rotate(0deg) translateY(0px)';
    }

    const tilt = (Math.random() - 0.5) * 14;
    const lift = -(Math.random() * 6 + 3);
    cards[shuffleStep].style.transition = 'transform 0.18s cubic-bezier(0.4,0,0.2,1)';
    cards[shuffleStep].style.transform  = `rotateY(180deg) rotate(${tilt}deg) translateY(${lift}px)`;

    shuffleStep++;
    shuffleTimer = setTimeout(tick, 80);
  }
  tick();
}

function stopTitleShuffle(){
  // マウスアウトしても再生は止めない。カードリセットのみ行う
  document.querySelectorAll('.cw.title-card .card').forEach(c=>{
    c.style.transition = 'transform 0.35s cubic-bezier(0.4,0,0.2,1)';
    c.style.transform  = 'rotateY(180deg) rotate(0deg) translateY(0px)';
  });
}

build();
requestAnimationFrame(staggerIn);

let resizeTimer = null;
window.addEventListener('resize', ()=>{
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(()=>{
    build();
    requestAnimationFrame(staggerIn);
  }, 150);
});
</script>
