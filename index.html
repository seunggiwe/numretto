<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUMLETTO — 数字を並べろ、ただそれだけ。</title>
<meta property="og:title" content="NUMLETTO — 数字並べ対戦ゲーム">
<meta property="og:description" content="数字を並べろ、ただそれだけ。最大6人のリアルタイム対戦。">
<meta property="og:image" content="https://seunggiwe.github.io/numeretto/ogp.png">
<meta name="twitter:card" content="summary_large_image">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0a0a0a;
  --fd:        #1a2a3a;
  --fdb:       #2a4a6a;
  --fu:        #f5f0e8;
  --fub:       #c8c0a8;
  --ft:        #0d0d0d;
  --accent:    #e8d44d;
  --text:      #e8e8e8;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;height:100dvh;overflow:hidden;}

/* ── フィールド ── */
#field{position:fixed;inset:0;z-index:0;}

.cw{
  position:absolute;
  perspective:1100px;
}
.card{
  width:100%;height:100%;
  position:relative;
  transform-style:preserve-3d;
  will-change:transform;
  transform:rotateY(0deg);
}
.cf{
  position:absolute;inset:0;
  border-radius:6px;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
/* 裏面 */
.cb{
  background:var(--fd);
  border:2px solid var(--fdb);
  box-shadow:0 3px 12px rgba(0,0,0,0.5);
}
.cb::after{
  content:'';position:absolute;inset:0;
  background-image:repeating-linear-gradient(45deg,transparent 0,transparent 5px,rgba(255,255,255,0.03) 5px,rgba(255,255,255,0.03) 6px);
}
/* 表面 */
.cv{
  background:var(--fu);
  border:2px solid var(--fub);
  box-shadow:0 3px 12px rgba(0,0,0,0.3);
  transform:rotateY(180deg);
  color:var(--ft);
  font-family:'Bebas Neue',cursive;
  user-select:none;
}

/* ── タイトルカード（常時表向き）── */
.cw.title-card .card{
  transform:rotateY(180deg);
  pointer-events:none;
}
.cw.title-card .cv{
  font-family:'Space Mono',monospace;
  font-weight:700;
  font-size:inherit; /* JS で設定 */
  box-shadow:0 4px 20px rgba(0,0,0,0.45);
}

/* ── GOカード ── */
.cw.go-card{z-index:10;cursor:pointer;}
.cw.go-card .cb{
  border-color:var(--accent);
  box-shadow:0 0 0 1px rgba(232,212,77,0.2),0 6px 30px rgba(0,0,0,0.65);
}
.cw.go-card .cv{flex-direction:column;}
.play-label{font-family:'Bebas Neue',cursive;letter-spacing:0.1em;color:var(--ft);line-height:1;}
.play-hint{font-family:'Bebas Neue',cursive;color:#888;letter-spacing:0.22em;margin-top:5px;}

/* ── モーダル ── */
#mo{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.72);
  backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity 0.28s;
}
#mo.show{opacity:1;pointer-events:auto;}
#md{
  background:var(--fu);border:2px solid var(--fub);border-radius:10px;
  width:min(380px,88vw);padding:36px 36px 28px;
  position:relative;
  transform:translateY(18px) scale(0.97);
  transition:transform 0.28s cubic-bezier(0.22,1,0.36,1);
  box-shadow:0 24px 80px rgba(0,0,0,0.7);
}
#mo.show #md{transform:translateY(0) scale(1);}
#mc{
  position:absolute;top:14px;right:16px;
  background:none;border:none;font-size:1.3rem;color:#bbb;
  cursor:pointer;line-height:1;padding:2px 4px;transition:color 0.15s;
}
#mc:hover{color:var(--ft);}
.mt{font-family:'Bebas Neue',cursive;font-size:2rem;letter-spacing:0.18em;color:var(--ft);margin-bottom:4px;line-height:1;}
.ms{font-size:0.62rem;letter-spacing:0.2em;color:#999;font-weight:300;margin-bottom:28px;}
.ff{display:flex;flex-direction:column;gap:4px;margin-bottom:16px;}
.fl{font-size:0.58rem;letter-spacing:0.2em;color:#888;font-weight:300;font-family:'Noto Sans JP',sans-serif;}
.fi{
  background:transparent;border:none;border-bottom:1.5px solid #c0b8a8;
  font-family:'Bebas Neue',cursive;font-size:1.3rem;letter-spacing:0.07em;
  color:var(--ft);outline:none;transition:border-color 0.2s;width:100%;padding:4px 0;
}
.fi:focus{border-color:#888;}
.fi::placeholder{color:#ccc;font-family:'Noto Sans JP',sans-serif;font-weight:300;font-size:0.72rem;letter-spacing:0.1em;}
.fi.err{border-color:#e05c4b!important;}
.fb{
  width:100%;margin-top:24px;background:var(--ft);color:var(--fu);
  border:none;font-family:'Bebas Neue',cursive;font-size:1rem;letter-spacing:0.22em;
  padding:12px;border-radius:3px;cursor:pointer;transition:opacity 0.15s;
}
.fb:hover{opacity:0.72;}

/* ── サブUI ── */
#ui-sub{
  position:fixed;z-index:20;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
  white-space:nowrap;
}
#ui-persons{
  position:fixed;z-index:20;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  pointer-events:none;
}
.logo-sub{font-size:clamp(0.65rem,1.2vw,0.85rem);letter-spacing:0.24em;color:rgba(255,255,255,0.55);font-weight:400;text-shadow:0 1px 3px rgba(0,0,0,0.85);}
#tl{display:flex;flex-direction:column;align-items:center;gap:4px;}
.persons{display:flex;gap:5px;align-items:flex-end;}
.tll{font-size:clamp(0.55rem,0.9vw,0.68rem);letter-spacing:0.22em;color:rgba(232,212,77,0.7);font-weight:300;}

/* グレイン */
#grain{position:fixed;inset:0;z-index:100;pointer-events:none;opacity:0.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px;}
</style>
</head>
<body>
<div id="grain"></div>
<div id="field"></div>

<div id="mo">
  <div id="md">
    <button id="mc" aria-label="閉じる">×</button>
    <div class="mt">NUMLETTO</div>
    <div class="ms">名前と合言葉を入力してゲームへ</div>
    <div class="ff">
      <span class="fl">名　前</span>
      <input class="fi" id="nameInput" placeholder="あなたの名前" maxlength="12" autocomplete="off">
    </div>
    <div class="ff" style="margin-bottom:0">
      <span class="fl">合言葉</span>
      <input class="fi" id="roomInput" placeholder="空欄で新規ルーム" maxlength="20" style="text-transform:uppercase" autocomplete="off">
    </div>
    <button class="fb" id="goBtn">ENTRY →</button>
  </div>
</div>

<div id="ui-sub">
  <div class="logo-sub">数字を並べる。ただそれだけ。</div>
</div>



<script>
const GAME_URL = './completto.html';
const LETTERS  = ['N','U','M','L','E','T','T','O'];



function shuffle(a){return a.sort(()=>Math.random()-0.5);}

let centerWrap = null;

// ── ホバーフリップ（通常カード）──
function setupHover(wrap, card){
  let state='back', timer=null;
  wrap.addEventListener('mouseenter',()=>{
    if(timer){clearTimeout(timer);timer=null;}
    state='front';
    card.style.transition='transform 0.48s cubic-bezier(0.4,0,0.2,1)';
    card.style.transform='rotateY(180deg)';
  });
  wrap.addEventListener('mouseleave',()=>{
    if(state!=='front') return;
    state='returning';
    card.style.transition='transform 0.48s cubic-bezier(0.4,0,0.2,1)';
    card.style.transform='rotateY(360deg)';
    timer=setTimeout(()=>{
      card.style.transition='none';
      card.style.transform='rotateY(0deg)';
      state='back';
    },500);
  });
}

// ── GOカード（ホバーでめくれ、クリックでモーダル）──
function setupGo(wrap, card){
  let clicked=false;
  wrap.addEventListener('mouseenter',()=>{
    if(clicked) return;
    card.style.transition='transform 0.48s cubic-bezier(0.4,0,0.2,1)';
    card.style.transform='rotateY(180deg)';
  });
  wrap.addEventListener('mouseleave',()=>{
    if(clicked) return;
    card.style.transition='transform 0.48s cubic-bezier(0.4,0,0.2,1)';
    card.style.transform='rotateY(0deg)';
  });
  wrap.addEventListener('click',()=>{
    clicked=true;
    card.style.transition='transform 0.42s cubic-bezier(0.4,0,0.2,1)';
    card.style.transform='rotateY(180deg)';
    setTimeout(openModal,280);
  });
}

// ── モーダル ──
function openModal(){
  document.getElementById('mo').classList.add('show');
  setTimeout(()=>document.getElementById('nameInput')?.focus(),200);
  const room=new URLSearchParams(location.search).get('room');
  if(room){const ri=document.getElementById('roomInput');if(ri&&!ri.value)ri.value=room.toUpperCase();}
}
function closeModal(){document.getElementById('mo').classList.remove('show');}
document.getElementById('mc').addEventListener('click',closeModal);
document.getElementById('mo').addEventListener('click',e=>{if(e.target===document.getElementById('mo'))closeModal();});
document.getElementById('goBtn').addEventListener('click',goToGame);
['nameInput','roomInput'].forEach(id=>{
  document.getElementById(id)?.addEventListener('keydown',e=>{if(e.key==='Enter')goToGame();});
});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

function goToGame(){
  const name=document.getElementById('nameInput')?.value.trim();
  const room=document.getElementById('roomInput')?.value.trim().toUpperCase();
  const ni=document.getElementById('nameInput');
  if(!name){ni?.classList.add('err');ni?.focus();setTimeout(()=>ni?.classList.remove('err'),1500);return;}
  const p=new URLSearchParams();
  p.set('name',name);
  if(room)p.set('room',room);
  location.href=GAME_URL+'?'+p.toString();
}

// ── メイン構築 ──
function build(){
  const field=document.getElementById('field');
  field.innerHTML='';
  centerWrap=null;

  const vw=window.innerWidth, vh=window.innerHeight;
  const gap=4;

  // ── 列数: カード幅を先に決めて列数を逆算、奇数に揃える ──
  // カード幅の目安（画面幅の約1/12）
  const wTarget = Math.max(52, Math.round(vw / 12));
  const h = Math.round(wTarget / 1);
  // 画面を完全に埋めるのに必要な列数（端まではみ出す分+2）
  let cols = Math.ceil(vw / (wTarget + gap)) + 2;
  if(cols % 2 === 0) cols += 1; // 奇数に揃える
  // カード幅を列数から逆算して均等割り
  const w = Math.round((vw + gap) / cols - gap);

  const rows=Math.ceil(vh/(h+gap))+1;
  const totalW=cols*(w+gap)-gap;
  const totalH=rows*(h+gap)-gap;
  const ox=(vw-totalW)/2;
  const oy=(vh-totalH)/2;

  // ── タイトル行・GOカード行の決定 ──
  const titleRow=Math.floor(rows/2)-1;
  const goRow=titleRow+1;
  const goCol=Math.floor(cols/2);  // 奇数列なので必ず整数の中央

  // LETTERS.length=8(偶数): LとEの境界をページ中心線に合わせる
  // 中心線 = vw/2
  // L(index3)の右端 = titleStartCol*w + 4*(w+gap) - gap/2 = 中心線
  // → titleStartCol = (vw/2 + gap/2 - 4*(w+gap)) / (w+gap) だが
  // グリッドのoxオフセットがあるので、列インデックスで計算:
  // LとEの「境界」はlCol右端とeCol左端の間 = ox + eCol*(w+gap) - gap/2 = vw/2
  // → eCol*(w+gap) = vw/2 - ox + gap/2
  // oxはグリッド全体の左オフセット。eCol = lCol+1 = titleStartCol+4
  // titleStartCol = goCol - 4 のままにして、代わりにグリッド全体のoxを
  // L/E境界が中央になるようにずらす
  const titleStartCol=goCol-4;
  const lCol=titleStartCol+3; // L
  const eCol=titleStartCol+4; // E
  // L/E境界のx座標（ずらし前） = ox + eCol*(w+gap) - gap/2
  // これを vw/2 にしたいので、oxを補正
  const rawOx=ox;
  const leBoundaryX = rawOx + eCol*(w+gap) - gap/2;
  const centerX = vw/2;
  const oxShift = centerX - leBoundaryX;
  const ox2 = rawOx + oxShift; // 補正後のox

  const nums=shuffle(Array.from({length:100},(_,i)=>i+1));
  let ni=0;

  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const x=ox2+c*(w+gap);
      const y=oy+r*(h+gap);

      const letterIdx=(r===titleRow && c>=titleStartCol && c<titleStartCol+LETTERS.length)
        ? c-titleStartCol : -1;

      const isPlayAnchor=(r===goRow && c===lCol);

      const wrap=document.createElement('div');
      wrap.className='cw'+(letterIdx>=0?' title-card':'');

      if(isPlayAnchor){
          const centerBtnX = ox2 + eCol*(w+gap) - gap/2;
          const centerBtnY = oy + goRow*(h+gap) + h/2;
          const btn=document.createElement('button');
          btn.id='playBtn';
          btn.style.cssText=`
            position:absolute;
            left:${centerBtnX}px;top:${centerBtnY}px;
            transform:translate(-50%, -50%);
            z-index:10;cursor:pointer;
            background:rgba(10,10,10,0.55);
            backdrop-filter:blur(4px);
            border:1.5px solid var(--accent);
            border-radius:5px;
            padding:12px 22px;
            font-family:'Space Mono',monospace;
            font-size:1.2rem;
            letter-spacing:0.08em;
            color:var(--accent);
            text-shadow:0 0 12px rgba(232,212,77,0.5);
            box-shadow:0 0 18px rgba(232,212,77,0.18),0 4px 20px rgba(0,0,0,0.6);
            transition:background 0.18s,color 0.18s,box-shadow 0.18s,text-shadow 0.18s;
          `;
          btn.textContent='PLAY';
          btn.addEventListener('click', openModal);
          btn.addEventListener('mouseenter',()=>{
            btn.style.background='var(--accent)'; btn.style.color='var(--ft)'; btn.style.textShadow='none'; btn.style.boxShadow='0 0 28px rgba(232,212,77,0.4),0 4px 20px rgba(0,0,0,0.6)';
            startTitleShuffle();
          });
          btn.addEventListener('mouseleave',()=>{
            btn.style.background='rgba(10,10,10,0.55)'; btn.style.color='var(--accent)'; btn.style.textShadow='0 0 12px rgba(232,212,77,0.5)'; btn.style.boxShadow='0 0 18px rgba(232,212,77,0.18),0 4px 20px rgba(0,0,0,0.6)';
            stopTitleShuffle();
          });
          field.appendChild(btn);
      }

      wrap.style.cssText=`left:${x}px;top:${y}px;width:${w}px;height:${h}px;`;
      const card=document.createElement('div');
      card.className='card';
      const back=document.createElement('div'); back.className='cf cb';
      const front=document.createElement('div'); front.className='cf cv';

      if(letterIdx>=0){
        front.style.fontSize=Math.round(w*0.72)+'px';
        front.textContent=LETTERS[letterIdx];
        card.style.transform='rotateY(180deg)';
      } else {
        front.style.fontSize=Math.round(h*0.34)+'px';
        front.textContent=nums[ni++%100];
      }

      card.append(back,front);
      wrap.appendChild(card);
      field.appendChild(wrap);

      if(letterIdx>=0){
        // ホバーでそのカード1枚だけシャッフルアニメ
        wrap.addEventListener('mouseenter',()=>{ tiltTitleCard(card); });
        wrap.addEventListener('mouseleave',()=>{ resetTitleCard(card); });
      }
      else setupHover(wrap,card);
    }
  }

  // サブUI位置: タイトル行の上
  // 「数字を並べろ」: タイトルカード行の上
  const titleY = oy + titleRow*(h+gap);
  const uiSub = document.getElementById('ui-sub');
  uiSub.style.cssText = `left:50%;transform:translateX(-50%);top:${Math.max(8, titleY-36)}px;`;

  // 人数アイコン: PLAYボタンの下
  const playBtnY = oy + goRow*(h+gap) + h/2;
  const uiPersons = document.getElementById('ui-persons');
  uiPersons.style.cssText = `left:50%;transform:translateX(-50%);top:${playBtnY + 36}px;`;
}

// 入場アニメ（タイトルカード除く）
function staggerIn(){
  const all=shuffle(Array.from(document.querySelectorAll('.cw:not(.title-card)')));
  all.forEach((w,i)=>{
    w.style.opacity='0';
    w.style.transition='opacity 0.3s';
    setTimeout(()=>{w.style.opacity='1';},i*3);
  });
  // タイトルカードは最後にまとめてフェードイン
  document.querySelectorAll('.cw.title-card').forEach((w,i)=>{
    w.style.opacity='0';
    w.style.transition='opacity 0.5s';
    setTimeout(()=>{w.style.opacity='1';},300+i*60);
  });
}

function tiltTitleCard(card){
  const tilt = (Math.random() - 0.5) * 14;
  const lift = -(Math.random() * 6 + 3);
  card.style.transition = 'transform 0.18s cubic-bezier(0.4,0,0.2,1)';
  card.style.transform  = `rotateY(180deg) rotate(${tilt}deg) translateY(${lift}px)`;
}

function resetTitleCard(card){
  card.style.transition = 'transform 0.25s cubic-bezier(0.4,0,0.2,1)';
  card.style.transform  = 'rotateY(180deg) rotate(0deg) translateY(0px)';
}

// ── PLAYホバー時: タイトルカードを順番に傾けるシャッフル演出 ──
let shuffleTimer = null;
let shuffleStep  = 0;

function startTitleShuffle(){
  if(shuffleTimer !== null) return; // 再生中は新たに起動しない
  shuffleStep = 0;
  const cards = Array.from(document.querySelectorAll('.cw.title-card .card'));
  if(!cards.length) return;

  function tick(){
    if(shuffleStep >= cards.length){
      // 最後の1枚を戻して完全終了
      const last = cards[cards.length - 1];
      last.style.transition = 'transform 0.18s cubic-bezier(0.4,0,0.2,1)';
      last.style.transform  = 'rotateY(180deg) rotate(0deg) translateY(0px)';
      shuffleTimer = null;
      return;
    }

    if(shuffleStep > 0){
      const prev = cards[shuffleStep - 1];
      prev.style.transition = 'transform 0.18s cubic-bezier(0.4,0,0.2,1)';
      prev.style.transform  = 'rotateY(180deg) rotate(0deg) translateY(0px)';
    }

    const tilt = (Math.random() - 0.5) * 14;
    const lift = -(Math.random() * 6 + 3);
    cards[shuffleStep].style.transition = 'transform 0.18s cubic-bezier(0.4,0,0.2,1)';
    cards[shuffleStep].style.transform  = `rotateY(180deg) rotate(${tilt}deg) translateY(${lift}px)`;

    shuffleStep++;
    shuffleTimer = setTimeout(tick, 80);
  }
  tick();
}

function stopTitleShuffle(){
  // マウスアウトしても再生は止めない。カードリセットのみ行う
  document.querySelectorAll('.cw.title-card .card').forEach(c=>{
    c.style.transition = 'transform 0.35s cubic-bezier(0.4,0,0.2,1)';
    c.style.transform  = 'rotateY(180deg) rotate(0deg) translateY(0px)';
  });
}

build();
requestAnimationFrame(staggerIn);
window.addEventListener('resize',()=>{build();requestAnimationFrame(staggerIn);});
</script>
</body>
</html>
